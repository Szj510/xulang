name: CI

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  android:
    name: Flutter checks and Android debug build
    runs-on: ubuntu-latest
    timeout-minutes: 35
    outputs:
      ios_exists: ${{ steps.platforms.outputs.ios_exists }}
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Detect iOS platform directory
        id: platforms
        shell: bash
        run: |
          if [[ -d ios ]]; then
            echo "ios_exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "ios_exists=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Check formatting
        run: dart format --output=none --set-exit-if-changed lib test

      - name: Analyze
        run: flutter analyze --no-pub

      - name: Test
        run: flutter test --no-pub --exclude-tags golden --reporter compact

      - name: Build Android debug APK
        run: flutter build apk --debug

  goldens:
    name: Golden image tests (Windows)
    runs-on: windows-latest
    timeout-minutes: 20
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Run golden tests
        shell: pwsh
        run: |
          for ($attempt = 1; $attempt -le 3; $attempt++) {
            flutter test test/goldens --no-pub --reporter compact
            if ($LASTEXITCODE -eq 0) {
              exit 0
            }
            if ($attempt -lt 3) {
              Write-Warning "Golden test command failed on attempt $attempt; retrying in 10 seconds."
              Start-Sleep -Seconds 10
            }
          }
          exit $LASTEXITCODE

  ios:
    name: Experimental iOS no-codesign build
    needs: android
    if: needs.android.outputs.ios_exists == 'true'
    runs-on: macos-latest
    timeout-minutes: 35
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Build iOS without signing
        run: flutter build ios --no-codesign
