name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish APK
    runs-on: ubuntu-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v7

      - name: Verify tag matches pubspec version
        shell: bash
        run: |
          app_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml)"
          expected_tag="v${app_version%%+*}"
          if [[ "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $app_version ($expected_tag)." >&2
            exit 1
          fi

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing configuration
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEYSTORE_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Required GitHub Actions secret $name is missing." >&2
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/xulang-upload.jks"
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=%s\n' "$RUNNER_TEMP/xulang-upload.jks"
          } > android/key.properties

      - name: Run release checks
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze --no-pub
          flutter test --no-pub --exclude-tags golden --reporter compact

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Prepare release artifacts
        shell: bash
        run: |
          artifact="xulang-${GITHUB_REF_NAME}-android.apk"
          cp build/app/outputs/flutter-apk/app-release.apk "$artifact"
          sha256sum "$artifact" > "${artifact}.sha256"

      - name: Publish GitHub Release
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          artifact="xulang-${GITHUB_REF_NAME}-android.apk"
          gh release create "$GITHUB_REF_NAME" \
            "$artifact" \
            "${artifact}.sha256" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --generate-notes
