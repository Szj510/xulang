name: Release Android APK

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write
  id-token: write
  attestations: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, verify, and publish Android APKs
    runs-on: ubuntu-latest
    timeout-minutes: 50
    steps:
      - name: Check out repository
        uses: actions/checkout@fbc6f3992d24b796d5a048ff273f7fcc4a7b6c09 # v5

      - name: Resolve and verify release version
        id: version
        shell: bash
        run: |
          app_version="$(sed -n 's/^version:[[:space:]]*//p' pubspec.yaml)"
          version="${app_version%%+*}"
          expected_tag="v${version}"
          if [[ "$GITHUB_REF_TYPE" == "tag" && "$GITHUB_REF_NAME" != "$expected_tag" ]]; then
            echo "Tag $GITHUB_REF_NAME does not match pubspec version $app_version ($expected_tag)." >&2
            exit 1
          fi
          echo "version=$version" >> "$GITHUB_OUTPUT"
          echo "tag=$expected_tag" >> "$GITHUB_OUTPUT"

      - name: Set up Java 17
        uses: actions/setup-java@03ad4de0992f5dab5e18fcb136590ce7c4a0ac95 # v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Install pinned Flutter SDK
        shell: bash
        run: |
          git init "$RUNNER_TEMP/flutter"
          git -C "$RUNNER_TEMP/flutter" remote add origin https://github.com/flutter/flutter.git
          git -C "$RUNNER_TEMP/flutter" fetch --depth 1 origin cc0734ac716fbb8b90f3f9db8020958b1553afa7
          git -C "$RUNNER_TEMP/flutter" checkout --detach FETCH_HEAD
          echo "$RUNNER_TEMP/flutter/bin" >> "$GITHUB_PATH"

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing configuration
        shell: bash
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          for name in ANDROID_KEYSTORE_BASE64 ANDROID_KEY_ALIAS ANDROID_KEY_PASSWORD ANDROID_KEYSTORE_PASSWORD; do
            if [[ -z "${!name}" ]]; then
              echo "Required GitHub Actions secret $name is missing." >&2
              exit 1
            fi
          done
          printf '%s' "$ANDROID_KEYSTORE_BASE64" | base64 --decode > "$RUNNER_TEMP/xulang-upload.jks"
          {
            printf 'storePassword=%s\n' "$ANDROID_KEYSTORE_PASSWORD"
            printf 'keyPassword=%s\n' "$ANDROID_KEY_PASSWORD"
            printf 'keyAlias=%s\n' "$ANDROID_KEY_ALIAS"
            printf 'storeFile=%s\n' "$RUNNER_TEMP/xulang-upload.jks"
          } > android/key.properties

      - name: Run release checks
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze --no-pub
          flutter test --no-pub --exclude-tags golden --reporter compact

      - name: Build signed universal and ARM64 APKs
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          mkdir -p dist
          flutter build apk --release
          cp build/app/outputs/flutter-apk/app-release.apk "dist/xulang-v${version}-android-universal.apk"
          flutter build apk --release --split-per-abi
          cp build/app/outputs/flutter-apk/app-arm64-v8a-release.apk "dist/xulang-v${version}-android-arm64-v8a.apk"

      - name: Verify signatures and prepare checksums
        shell: bash
        env:
          EXPECTED_CERT_SHA256: 0f3c0452bb00517e93ce6eaf2fe944106a062c71dfe6a077bac241d0e46f167d
        run: |
          set -euo pipefail
          apksigner="$(find "$ANDROID_SDK_ROOT/build-tools" -type f -name apksigner | sort -V | tail -n 1)"
          if [[ -z "$apksigner" ]]; then
            echo "apksigner was not found in the Android SDK." >&2
            exit 1
          fi
          for artifact in dist/*.apk; do
            "$apksigner" verify --verbose "$artifact"
            actual="$("$apksigner" verify --print-certs "$artifact" | sed -n 's/^Signer #1 certificate SHA-256 digest: //p' | tr '[:upper:]' '[:lower:]')"
            if [[ "$actual" != "$EXPECTED_CERT_SHA256" ]]; then
              echo "Unexpected signing certificate for $artifact: $actual" >&2
              exit 1
            fi
          done
          (cd dist && sha256sum *.apk > SHA256SUMS.txt)

      - name: Generate release notes
        shell: bash
        run: |
          set -euo pipefail
          version="${{ steps.version.outputs.version }}"
          {
            printf '# Xulang v%s / 叙廊 v%s\n\n' "$version" "$version"
            printf '## Install / 安装\n\n'
            printf -- '- **ARM64 (recommended / 推荐):** `xulang-v%s-android-arm64-v8a.apk`\n' "$version"
            printf -- '- **Universal (fallback / 通用版):** `xulang-v%s-android-universal.apk`\n' "$version"
            printf -- '- Android 10 (API 29) or newer / Android 10 或更高版本\n\n'
            printf 'Verify downloads with `SHA256SUMS.txt`. The official signing certificate SHA-256 is:\n\n'
            printf '`0f3c0452bb00517e93ce6eaf2fe944106a062c71dfe6a077bac241d0e46f167d`\n\n'
            printf 'Verify build provenance with:\n\n'
            printf '```bash\ngh attestation verify xulang-v%s-android-arm64-v8a.apk --repo %s\n```\n\n' "$version" "$GITHUB_REPOSITORY"
            printf 'Xulang does not request Android network permission and does not upload user media.\n\n'
            awk -v version="$version" '
              $0 ~ "^## \\[" version "\\]" { found=1; next }
              found && /^## \\[/ { exit }
              found { print }
            ' CHANGELOG.md
          } > dist/RELEASE_NOTES.md

      - name: Upload dry-run artifacts
        uses: actions/upload-artifact@ea165f8d65b6e75b540449e92b4886f43607fa02 # v4
        with:
          name: xulang-v${{ steps.version.outputs.version }}-android
          path: |
            dist/*.apk
            dist/SHA256SUMS.txt
            dist/RELEASE_NOTES.md
          if-no-files-found: error

      - name: Attest APK build provenance
        uses: actions/attest-build-provenance@977bb373ede98d70efdf65b84cb5f73e068dcc2a # v3
        with:
          subject-path: dist/*.apk

      - name: Append automatically generated changes
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          generated="$(gh api --method POST "repos/$GITHUB_REPOSITORY/releases/generate-notes" -f tag_name="$GITHUB_REF_NAME" --jq .body || true)"
          if [[ -n "$generated" ]]; then
            {
              printf '\n## Changes / 变更\n\n'
              printf '%s\n' "$generated"
            } >> dist/RELEASE_NOTES.md
          fi

      - name: Publish GitHub Release
        if: github.ref_type == 'tag'
        shell: bash
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          version="${{ steps.version.outputs.version }}"
          gh release create "$GITHUB_REF_NAME" \
            "dist/xulang-v${version}-android-arm64-v8a.apk" \
            "dist/xulang-v${version}-android-universal.apk" \
            "dist/SHA256SUMS.txt" \
            --repo "$GITHUB_REPOSITORY" \
            --verify-tag \
            --latest \
            --title "Xulang v${version} / 叙廊 v${version}" \
            --notes-file dist/RELEASE_NOTES.md

      - name: Remove signing material
        if: always()
        shell: bash
        run: rm -f android/key.properties "$RUNNER_TEMP/xulang-upload.jks"
