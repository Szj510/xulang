name: Release Android APK

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

concurrency:
  group: release-${{ github.ref }}
  cancel-in-progress: false

jobs:
  release:
    name: Build, sign, and publish APK
    runs-on: windows-latest
    timeout-minutes: 40
    steps:
      - name: Check out repository
        uses: actions/checkout@v5

      - name: Verify tag matches pubspec version
        shell: pwsh
        run: |
          $match = Select-String -Path pubspec.yaml -Pattern '^version:\s*(.+)$'
          if (-not $match) {
            throw 'pubspec.yaml does not contain a version.'
          fi
          $appVersion = $match.Matches[0].Groups[1].Value.Trim()
          $expectedTag = "v$($appVersion.Split('+')[0])"
          if ($env:GITHUB_REF_NAME -ne $expectedTag) {
            throw "Tag $env:GITHUB_REF_NAME does not match pubspec version $appVersion ($expectedTag)."
          }

      - name: Set up Java 17
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: "17"

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          flutter-version: 3.41.7
          channel: stable
          cache: true

      - name: Install dependencies
        run: flutter pub get

      - name: Restore Android signing configuration
        shell: pwsh
        env:
          ANDROID_KEYSTORE_BASE64: ${{ secrets.ANDROID_KEYSTORE_BASE64 }}
          ANDROID_KEY_ALIAS: ${{ secrets.ANDROID_KEY_ALIAS }}
          ANDROID_KEY_PASSWORD: ${{ secrets.ANDROID_KEY_PASSWORD }}
          ANDROID_KEYSTORE_PASSWORD: ${{ secrets.ANDROID_KEYSTORE_PASSWORD }}
        run: |
          $required = @(
            'ANDROID_KEYSTORE_BASE64',
            'ANDROID_KEY_ALIAS',
            'ANDROID_KEY_PASSWORD',
            'ANDROID_KEYSTORE_PASSWORD'
          )
          foreach ($name in $required) {
            if ([string]::IsNullOrWhiteSpace([Environment]::GetEnvironmentVariable($name))) {
              throw "Required GitHub Actions secret $name is missing."
            }
          }
          $keystorePath = (Join-Path $env:RUNNER_TEMP 'xulang-upload.jks')
          [IO.File]::WriteAllBytes(
            $keystorePath,
            [Convert]::FromBase64String($env:ANDROID_KEYSTORE_BASE64)
          )
          $gradleKeystorePath = $keystorePath.Replace('\', '/')
          @(
            "storePassword=$env:ANDROID_KEYSTORE_PASSWORD",
            "keyPassword=$env:ANDROID_KEY_PASSWORD",
            "keyAlias=$env:ANDROID_KEY_ALIAS",
            "storeFile=$gradleKeystorePath"
          ) | Set-Content -Path android/key.properties -Encoding utf8

      - name: Run release checks
        run: |
          dart format --output=none --set-exit-if-changed lib test
          flutter analyze --no-pub
          flutter test --no-pub --reporter compact

      - name: Build signed release APK
        run: flutter build apk --release

      - name: Prepare release artifacts
        shell: pwsh
        run: |
          $artifact = "xulang-$env:GITHUB_REF_NAME-android.apk"
          Copy-Item build/app/outputs/flutter-apk/app-release.apk $artifact
          $hash = (Get-FileHash -Algorithm SHA256 $artifact).Hash.ToLowerInvariant()
          "$hash  $artifact" | Set-Content -Path "$artifact.sha256" -Encoding ascii

      - name: Publish GitHub Release
        shell: pwsh
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          $artifact = "xulang-$env:GITHUB_REF_NAME-android.apk"
          gh release create $env:GITHUB_REF_NAME `
            $artifact `
            "$artifact.sha256" `
            --repo $env:GITHUB_REPOSITORY `
            --verify-tag `
            --generate-notes
